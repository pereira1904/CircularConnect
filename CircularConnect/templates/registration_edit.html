{% extends "base.html" %}
{% block title %}Edit Registration #{{ registration['id'] }} — CircularConnect{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Edit Registration #{{ registration['id'] }}</h2>

    <form method="POST" action="{{ url_for('registration_edit', reg_id=registration['id']) }}" data-validate>
        <!-- Personal Information -->
        <div class="form-row">
            <div class="form-group">
                <label for="first_name">First Name <span class="required">*</span></label>
                <input type="text" id="first_name" name="first_name"
                       value="{{ registration['first_name'] }}" required
                       placeholder="Enter your first name">
            </div>
            <div class="form-group">
                <label for="last_name">Last Name <span class="required">*</span></label>
                <input type="text" id="last_name" name="last_name"
                       value="{{ registration['last_name'] }}" required
                       placeholder="Enter your last name">
            </div>
        </div>

        <div class="form-group">
            <label for="email">Email Address <span class="required">*</span></label>
            <input type="email" id="email" name="email"
                   value="{{ registration['email'] }}" required
                   placeholder="your.email@example.com">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="organisation">Organisation</label>
                <input type="text" id="organisation" name="organisation"
                       value="{{ registration['organisation'] or '' }}"
                       placeholder="Your company or institution">
            </div>
            <div class="form-group">
                <label for="job_title">Job Title</label>
                <input type="text" id="job_title" name="job_title"
                       value="{{ registration['job_title'] or '' }}"
                       placeholder="Your role">
            </div>
        </div>

        <!-- Preferences -->
        <div class="form-group">
            <label for="session_preference">Session Preference</label>
            <select name="session_preference" id="session_preference">
                <option value="">— No preference —</option>
                <option value="Hardware Reuse and Recycling" {% if registration['session_preference'] == 'Hardware Reuse and Recycling' %}selected{% endif %}>Hardware Reuse and Recycling</option>
                <option value="Reverse Logistics" {% if registration['session_preference'] == 'Reverse Logistics' %}selected{% endif %}>Reverse Logistics</option>
                <option value="Digital Product Passports" {% if registration['session_preference'] == 'Digital Product Passports' %}selected{% endif %}>Digital Product Passports</option>
                <option value="AI in Circular Supply Chains" {% if registration['session_preference'] == 'AI in Circular Supply Chains' %}selected{% endif %}>AI in Circular Supply Chains</option>
                <option value="Secure Data Erasure" {% if registration['session_preference'] == 'Secure Data Erasure' %}selected{% endif %}>Secure Data Erasure</option>
                <option value="Sustainable Technology" {% if registration['session_preference'] == 'Sustainable Technology' %}selected{% endif %}>Sustainable Technology</option>
            </select>
        </div>

        <div class="form-group">
            <label for="dietary_requirements">Dietary Requirements</label>
            <input type="text" id="dietary_requirements" name="dietary_requirements"
                   value="{{ registration['dietary_requirements'] or '' }}"
                   placeholder="e.g., Vegetarian, Vegan, Gluten-free, None">
        </div>

        <!-- Submit -->
        <div class="btn-group mt-3">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ url_for('registration_detail', reg_id=registration['id']) }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
